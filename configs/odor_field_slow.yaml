# Odor field environment: slow depletion variant
# Depletion: slow (8-10 pass-throughs to deplete)
# Tests: does the agent stay longer at richer patches?
seed: 7

model:
  obs_dim: 3
  h_dim: 2
  m_dim: 3
  alpha_h: 0.04
  alpha_m: 0.40
  init_mode: handtuned
  use_h: true
  use_m: true

environment:
  type: odor_field
  world_size: 30.0
  step_size: 0.7
  turn_angle: 0.45
  start_pos: [15.0, 15.0]
  start_heading: 0.3

  patches:
    - center: [5.0, 6.0]
      radius: 1.2
      max_food: 0.50
      depletion_rate: 0.025
    - center: [10.0, 3.0]
      radius: 1.0
      max_food: 0.40
      depletion_rate: 0.020
    - center: [18.0, 5.0]
      radius: 1.3
      max_food: 0.55
      depletion_rate: 0.025
    - center: [26.0, 8.0]
      radius: 1.0
      max_food: 0.40
      depletion_rate: 0.020
    - center: [3.0, 15.0]
      radius: 1.2
      max_food: 0.45
      depletion_rate: 0.020
    - center: [13.0, 13.0]
      radius: 1.5
      max_food: 0.55
      depletion_rate: 0.025
    - center: [22.0, 14.0]
      radius: 1.0
      max_food: 0.40
      depletion_rate: 0.020
    - center: [7.0, 23.0]
      radius: 1.3
      max_food: 0.50
      depletion_rate: 0.025
    - center: [16.0, 25.0]
      radius: 1.2
      max_food: 0.45
      depletion_rate: 0.025
    - center: [25.0, 22.0]
      radius: 1.0
      max_food: 0.40
      depletion_rate: 0.020

  patch_regen_rate: 0.005
  odor_decay_rate: 0.004

  risk_center: [14.0, 8.0]
  risk_radius: 1.5
  risk_strength: 0.6
  risk_noise_prob: 0.03
  risk_noise_strength: 0.3

  food_sensor_sigma: 4.0
  odor_sensor_sigma: 3.5
  odor_noise_strength: 0.04
  risk_sensor_sigma: 1.4

simulation:
  steps: 3000
  output_dir: outputs/odor_field_slow/full

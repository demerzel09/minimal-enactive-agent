# Odor field environment: no-h ablation
# Same environment as odor_field.yaml but with h disabled
seed: 7

model:
  obs_dim: 3
  h_dim: 2
  m_dim: 3
  alpha_h: 0.04
  alpha_m: 0.40
  init_mode: handtuned
  use_h: false
  use_m: true

environment:
  world_size: 25.0
  step_size: 0.7
  turn_angle: 0.45
  start_pos: [12.0, 12.0]
  start_heading: 0.3

  patches:
    - center: [4.0, 5.0]
      radius: 0.8
      max_food: 0.4
      depletion_rate: 0.05
    - center: [8.0, 3.0]
      radius: 0.6
      max_food: 0.3
      depletion_rate: 0.04
    - center: [15.0, 4.0]
      radius: 0.7
      max_food: 0.5
      depletion_rate: 0.06
    - center: [21.0, 6.0]
      radius: 0.8
      max_food: 0.4
      depletion_rate: 0.05
    - center: [3.0, 13.0]
      radius: 0.7
      max_food: 0.35
      depletion_rate: 0.04
    - center: [10.0, 10.0]
      radius: 0.9
      max_food: 0.5
      depletion_rate: 0.05
    - center: [18.0, 12.0]
      radius: 0.6
      max_food: 0.3
      depletion_rate: 0.04
    - center: [6.0, 19.0]
      radius: 0.8
      max_food: 0.45
      depletion_rate: 0.05
    - center: [14.0, 20.0]
      radius: 0.7
      max_food: 0.4
      depletion_rate: 0.06
    - center: [22.0, 18.0]
      radius: 0.8
      max_food: 0.35
      depletion_rate: 0.04

  patch_regen_rate: 0.003
  odor_decay_rate: 0.005

  risk_center: [12.0, 7.0]
  risk_radius: 1.5
  risk_strength: 0.6
  risk_noise_prob: 0.03
  risk_noise_strength: 0.3

  food_sensor_sigma: 4.0
  odor_sensor_sigma: 10.0
  odor_noise_strength: 0.06
  risk_sensor_sigma: 1.4

simulation:
  steps: 1000
  output_dir: outputs/odor_field/no_h

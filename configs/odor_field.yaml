# Odor field environment: many small patches with lingering scent
# Tests: can the agent forage with noisy, unreliable odor gradients?
# Key properties:
#   - 10 patches (radius 1.0-1.5) scattered across the world
#   - Odor spreads widely (odor_sensor_sigma=6) — gradient exists but is noisy
#   - Depleted patches still smell (odor_decay_rate=0.005)
#   - Temporal noise (0.04) makes instant gradient unreliable
#   - Agent must integrate odor signal over time (h's job)
seed: 7

model:
  obs_dim: 3
  h_dim: 2
  m_dim: 3
  alpha_h: 0.04
  alpha_m: 0.40
  init_mode: handtuned
  use_h: true
  use_m: true

environment:
  world_size: 30.0
  step_size: 0.7
  turn_angle: 0.45
  start_pos: [15.0, 15.0]
  start_heading: 0.3

  patches:
    - center: [5.0, 6.0]
      radius: 1.2
      max_food: 0.20
      depletion_rate: 0.04
    - center: [10.0, 3.0]
      radius: 1.0
      max_food: 0.15
      depletion_rate: 0.03
    - center: [18.0, 5.0]
      radius: 1.3
      max_food: 0.25
      depletion_rate: 0.05
    - center: [26.0, 8.0]
      radius: 1.0
      max_food: 0.15
      depletion_rate: 0.04
    - center: [3.0, 15.0]
      radius: 1.2
      max_food: 0.18
      depletion_rate: 0.03
    - center: [13.0, 13.0]
      radius: 1.5
      max_food: 0.25
      depletion_rate: 0.04
    - center: [22.0, 14.0]
      radius: 1.0
      max_food: 0.15
      depletion_rate: 0.03
    - center: [7.0, 23.0]
      radius: 1.3
      max_food: 0.20
      depletion_rate: 0.04
    - center: [16.0, 25.0]
      radius: 1.2
      max_food: 0.20
      depletion_rate: 0.05
    - center: [25.0, 22.0]
      radius: 1.0
      max_food: 0.15
      depletion_rate: 0.03

  patch_regen_rate: 0.002
  odor_decay_rate: 0.005

  risk_center: [14.0, 8.0]
  risk_radius: 1.5
  risk_strength: 0.6
  risk_noise_prob: 0.03
  risk_noise_strength: 0.3

  food_sensor_sigma: 4.0
  odor_sensor_sigma: 6.0
  odor_noise_strength: 0.04
  risk_sensor_sigma: 1.4

simulation:
  steps: 1500
  output_dir: outputs/odor_field/full

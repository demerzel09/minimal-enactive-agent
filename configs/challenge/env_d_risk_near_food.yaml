# Env D: Risk adjacent to food
# Tests: can the agent exploit food while managing nearby risk?
# Probes: risk-sensitive mode switching — avoid mode must activate near food
seed: 7

model:
  obs_dim: 3
  h_dim: 2
  m_dim: 3
  alpha_h: 0.04
  alpha_m: 0.40
  init_mode: handtuned
  use_h: true
  use_m: true

environment:
  world_size: 20.0
  step_size: 0.7
  turn_angle: 0.45
  start_pos: [7.0, 10.0]
  start_heading: 0.1
  patch_center: [10.0, 10.0]
  patch_radius: 2.8
  patch_max_food: 1.0
  patch_depletion_rate: 0.035
  patch_regen_rate: 0.004
  risk_center: [12.0, 10.0]
  risk_radius: 1.8
  risk_strength: 1.0
  risk_noise_prob: 0.05
  risk_noise_strength: 0.7
  food_sensor_sigma: 4.0
  risk_sensor_sigma: 1.4

simulation:
  steps: 500
  output_dir: outputs/challenge/env_d

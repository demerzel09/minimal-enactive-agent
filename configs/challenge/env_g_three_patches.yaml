# Env G: Three patches with varying quality
# Tests: can the agent prioritize richer patches?
# Probes: whether h integrates food quality over time and influences patch choice
seed: 7

model:
  obs_dim: 3
  h_dim: 2
  m_dim: 3
  alpha_h: 0.04
  alpha_m: 0.40
  init_mode: handtuned
  use_h: true
  use_m: true

environment:
  world_size: 25.0
  step_size: 0.7
  turn_angle: 0.45
  start_pos: [5.0, 12.0]
  start_heading: 0.2

  patches:
    - center: [7.0, 12.0]
      radius: 2.0
      max_food: 0.4
      depletion_rate: 0.02
    - center: [15.0, 18.0]
      radius: 2.5
      max_food: 1.0
      depletion_rate: 0.04
    - center: [20.0, 7.0]
      radius: 2.0
      max_food: 0.7
      depletion_rate: 0.03

  patch_regen_rate: 0.003

  risk_center: [12.0, 10.0]
  risk_radius: 1.5
  risk_strength: 0.8
  risk_noise_prob: 0.03
  risk_noise_strength: 0.4
  food_sensor_sigma: 4.0
  risk_sensor_sigma: 1.4

simulation:
  steps: 1000
  output_dir: outputs/challenge/env_g

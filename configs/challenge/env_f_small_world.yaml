# Env F: Small confined world
# Tests: can the agent adapt to tight spaces where wall-bouncing dominates?
# Probes: robustness to environmental geometry change
seed: 7

model:
  obs_dim: 3
  h_dim: 2
  m_dim: 3
  alpha_h: 0.04
  alpha_m: 0.40
  init_mode: handtuned
  use_h: true
  use_m: true

environment:
  world_size: 10.0
  step_size: 0.7
  turn_angle: 0.45
  start_pos: [3.0, 5.0]
  start_heading: 0.1
  patch_center: [5.0, 5.0]
  patch_radius: 2.0
  patch_max_food: 1.0
  patch_depletion_rate: 0.035
  patch_regen_rate: 0.004
  risk_center: [8.0, 3.0]
  risk_radius: 1.0
  risk_strength: 0.9
  risk_noise_prob: 0.03
  risk_noise_strength: 0.5
  food_sensor_sigma: 3.0
  risk_sensor_sigma: 1.4

simulation:
  steps: 500
  output_dir: outputs/challenge/env_f
